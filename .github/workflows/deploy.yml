name: deploy

# Dispara apenas em push direto na main
on:
  push:
    branches:
      - main

# Garante que apenas um deploy rode por vez
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # 1. Qualidade — lint + testes devem passar antes de qualquer deploy
  # ---------------------------------------------------------------------------
  quality:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: Install Node dependencies
        run: npm ci

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Lint (Pint)
        run: composer lint:check

      - name: Run tests
        run: ./vendor/bin/pest --no-coverage

  # ---------------------------------------------------------------------------
  # 2. Build — gera os artefatos de produção
  # ---------------------------------------------------------------------------
  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies (sem dev)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --no-scripts

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets (produção)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Remover arquivos desnecessários para deploy
        run: |
          rm -rf node_modules
          rm -rf tests
          rm -rf .github
          rm -rf pag_can
          rm -rf docs
          rm -f .env
          rm -f .env.example
          rm -f docker-compose.yml
          rm -f phpunit.xml
          rm -f pint.json
          rm -f vite.config.js
          rm -f package.json
          rm -f package-lock.json
          rm -f composer.lock
          rm -f README.md

      - name: Upload artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: .
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. Deploy — envia para a Hostinger via FTP
  #
  # LIMITAÇÃO: sem SSH não é possível rodar php artisan migrate remotamente.
  # Após o deploy, acesse o painel da Hostinger e rode as migrations manualmente:
  #   Hostinger → Gerenciador de Arquivos → Terminal (se disponível)
  #   ou crie uma rota temporária de deploy (ver docs/deploy-manual.md)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Hostinger (FTP)
    runs-on: ubuntu-latest
    needs: build
    environment: Production

    steps:
      - name: Download artefato de build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: ./release

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./release/
          server-dir: /public_html/pagamento/
          # Arquivo de estado para deploy incremental (só envia o que mudou)
          state-name: .ftp-deploy-sync-state.json
          # Não apaga arquivos remotos que não existem localmente
          # (protege .env e storage que ficam só no servidor)
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/.env
